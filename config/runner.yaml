hydra:
  searchpath:
    - file://${oc.env:PROJECT_ROOT}/src/modules/m01_object_imagery/config
    - file://${oc.env:PROJECT_ROOT}/src/modules/m02_event_dream_replay/config
    - file://${oc.env:PROJECT_ROOT}/src/modules/m03_self_action_causality/config
    - file://${oc.env:PROJECT_ROOT}/src/modules/m04_long_dynamic_memory/config
    - file://${oc.env:PROJECT_ROOT}/src/modules/m05_world_model_attention_workspace/config
    - file://${oc.env:PROJECT_ROOT}/src/modules/m06_learning_sleep_consolidation/config
    - file://${oc.env:PROJECT_ROOT}/src/modules/m07_inner_speech_thoughts/config
    - file://${oc.env:PROJECT_ROOT}/src/modules/m08_debug_visual_control/config
    - file://${oc.env:PROJECT_ROOT}/src/modules/m09_self_core/config
    - file://${oc.env:PROJECT_ROOT}/src/modules/m10_global_conscious_broadcast/config
    - file://${oc.env:PROJECT_ROOT}/src/modules/m11_motivational_homeostasis/config
    - file://${oc.env:PROJECT_ROOT}/src/modules/m12_metacognition_monitor/config
    - file://${oc.env:PROJECT_ROOT}/src/modules/m13_autobiographical_memory/config
    - file://${oc.env:PROJECT_ROOT}/src/modules/m14_semantic_grounding/config
    - file://${oc.env:PROJECT_ROOT}/src/modules/m15_counterfactual_imagination_planning/config
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false

defaults:
  - object_imagery
  - event_memory_full
  - inner_real_action
  - action_control
  - long_dynamic_memory
  - world_model
  - learning_sleep
  - inner_speech
  - debug_visual_control
  - self_core
  - global_broadcast
  - motivational_homeostasis
  - metacognition
  - autobiographical_memory
  - semantic_grounding
  - adaptive_scenario_controller
  - control_panel
  - override hydra/job_logging: disabled
  - override hydra/hydra_logging: disabled
  - _self_

mode: train # train run

# ------------------------------------------------------------
# Runtime
# ------------------------------------------------------------
runtime:
  device: cuda
  seed: 42
  out_dir: /home/user/_project/temp/logs

# ------------------------------------------------------------
# Runner thread CPU affinity
# ------------------------------------------------------------
thread_affinity:
  enabled: true
  strict: false
  cpus:
    train: 1
    mujoco_viewer: 2
    ipc_control: 3
    module_status: 4
    slot_4d_jsonrpc: 5

# ------------------------------------------------------------
# MuJoCo world / cameras / body control
# ------------------------------------------------------------
mujoco_world:
  width: 192
  height: 128
  hfov_deg: 78.0
  baseline: 0.30
  human_mesh_path: assets/human.obj

  start_pos:
    - -3.0
    - -3.0
    - 2.2
  start_yaw_deg: 42.0
  start_pitch_deg: -18.0

  mj_substeps: 2

  base:
    move_gain: 0.035
    lift_gain: 0.025
    yaw_gain_deg: 2.2
    pitch_gain_deg: 1.4
    pitch_limit_deg: 65.0

# ------------------------------------------------------------
# Main MuJoCo viewer and status printing
# ------------------------------------------------------------
viewer:
  allow_mujoco_window: false
  print_status_every_sec: 1.0
  mujoco_threaded: false
  mujoco_sync_fps: 8.0
  mujoco_sync_every_steps: 2

# ------------------------------------------------------------
# Inner world visualizer
# ------------------------------------------------------------
inner_world:
  enabled: true
  width: 1800
  height: 1100
  show_every_steps: 1

  save_frames: false
  save_every_steps: 100
  out_dir: inner_world_frames

# ------------------------------------------------------------
# Life loop
# ------------------------------------------------------------
life:
  fps: 15
  max_steps: 1000000
  report_every_steps: 25
  checkpoint_every_steps: 500

# ------------------------------------------------------------
# Online training loop
# ------------------------------------------------------------
train:
  enabled: true
  lr: 0.00015
  weight_decay: 0.00001
  gradient_clip: 5.0
  train_sleep_sec: 0.01

  # If your TrainLoopConfig has these fields, they will be used.
  # If not, the runner config filter will ignore unsupported fields.
  stop_train_quality: 0.03
  stabilization_patience: 200

# ------------------------------------------------------------
# Replay buffer
# ------------------------------------------------------------
replay:
  capacity: 50000
  batch_size: 8
  min_ready: 128
  recent_bias: 0.75

# ------------------------------------------------------------
# Novelty detector
# ------------------------------------------------------------
novelty:
  enabled: true
  threshold: 0.18
  cooldown_steps: 100
  ema_decay: 0.985

checkpoint_load:
  # Load checkpoint state on startup.
  enabled_load: true

  # Save checkpoints periodically, on shutdown, and from the control panel.
  enabled_save: false

  # Load this checkpoint on startup.
  load_path: "./checkpoint/last.pt"

  # Save new checkpoints here.
  save_path: "./checkpoint/last_s.pt"

  strict: false
  load_optimizer: true
  load_counters: true

dynamic_agent_rig:
  enabled: true
  body_name: "agent_rig"
  freejoint_name: "agent_rig_free"

  max_linear_speed: 0.35
  max_vertical_speed: 0.45
  max_angular_speed: 0.6

  linear_kv: 10.0
  angular_kv: 6.0
  max_force: 800.0
  max_torque: 70.0

  min_z: 0.55
  max_z: 2.2
  ground_push_k: 100.0
  local_frame_linear: true
  gravity_compensation: true
  hover_enabled: true
  hover_height: 1.65
  dynamic_hover_target: true
  min_hover_height: 0.75
  max_hover_height: 3.0
  vertical_command_gain: 0.55
  hover_kp: 260.0
  hover_kd: 55.0
  emergency_lift_enabled: true
  emergency_z: 0.85
  emergency_vz: 1.2
  upright_enabled: true
  upright_kp: 8.0
  upright_kd: 2.0
  contact_angular_damping_enabled: true
  contact_roll_pitch_damping: 6.0
  contact_yaw_damping: 2.0
  contact_spin_limit: 2.0
  contact_spin_deadzone: 0.25
  disable_pitch_roll_commands: true
  contact_active_angular_damping: 65.0
  contact_active_yaw_damping: 18.0
  contact_active_upright_kp: 45.0
  contact_active_upright_kd: 16.0
  contact_torque_limit: 55.0


bird_body:
  enabled: true
  leg_smoothing: 0.05


leg_control:
  enabled: true
  leg_motor_dim: 18
  hidden_dim: 128
  smoothing: 0.05

vestibular:
  enabled: true
  add_to_body_state: true
  print_every_steps: 30
  balance_reward_weight: 0.04
  balance_gyro_penalty: 0.015
  balance_diff_penalty: 0.010
  balance_loss_weight: 0.03

mocap_contacts:
  enabled: true
  central_rig: "mocap"
  preserve_contacts: true
  notes: "agent_rig/cameras are mocap-stabilized; arms/legs/objects keep contacts"

mocap_flight_bounds:
  enabled: true
  min_z: 0.1
  max_z: 10.0

agent_head:
  enabled: true
  control_indices:
    body_roll: 11
    head_yaw: 12
    head_pitch: 13
    head_roll: 14
  notes: "embodied_dim is 15: old body/arms preserved, body roll at 11, head controls at 12:15"

