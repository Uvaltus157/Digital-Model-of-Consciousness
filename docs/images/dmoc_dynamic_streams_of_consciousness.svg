<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040" role="img" aria-labelledby="title desc">
<title id="title">DMoC — Dynamic Streams of Consciousness</title>
<desc id="desc">Pure vector SVG diagram of M1-M15 DMoC modules and information flows.</desc>
<style>
  .bg { fill: #07111f; }
  .grid { stroke: #16324c; stroke-width: 1; opacity: .45; }
  .title { font: 800 44px Arial, sans-serif; fill: #f4fbff; letter-spacing: 1px; }
  .subtitle { font: 400 20px Arial, sans-serif; fill: #b9d8f2; }
  .box { fill: #0b182b; stroke-width: 2.2; rx: 18; filter: url(#glow); }
  .small { font: 400 15px Arial, sans-serif; fill: #d7ecff; }
  .label { font: 800 22px Arial, sans-serif; fill: #ffffff; }
  .body { font: 400 16px Arial, sans-serif; fill: #d7ecff; }
  .num { font: 800 25px Arial, sans-serif; fill: #ffffff; }
  .moduleText { font: 800 18px Arial, sans-serif; fill: #ffffff; }
  .caption { font: 400 14px Arial, sans-serif; fill: #b8cfe8; }
  .hub { fill: url(#hubGrad); stroke: #55d7ff; stroke-width: 3; filter: url(#bigGlow); }
  .flow { fill: none; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowBlue); filter: url(#softGlow); }
  .flow2 { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 9 10; marker-end: url(#arrowGreen); }
  .flow3 { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 4 12; marker-end: url(#arrowRed); }
  .broadcast { fill: none; stroke: #c67cff; stroke-width: 5; stroke-linecap: round; marker-end: url(#arrowPurple); filter: url(#purpleGlow); }
  .pulse { animation: dash 2.8s linear infinite; }
  .pulseSlow { animation: dash 5s linear infinite; }
  @keyframes dash { to { stroke-dashoffset: -120; } }
</style>
<defs>
  <linearGradient id="hubGrad" x1="0%" x2="100%" y1="0%" y2="100%">
    <stop offset="0%" stop-color="#06265b"/>
    <stop offset="55%" stop-color="#0b87d1"/>
    <stop offset="100%" stop-color="#14205a"/>
  </linearGradient>
  <linearGradient id="goldGrad" x1="0%" x2="100%">
    <stop offset="0%" stop-color="#442b06"/><stop offset="100%" stop-color="#b97800"/>
  </linearGradient>
  <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
    <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#36b9ff" flood-opacity=".35"/>
  </filter>
  <filter id="bigGlow" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#44e3ff" flood-opacity=".75"/>
  </filter>
  <filter id="softGlow" x="-25%" y="-25%" width="150%" height="150%">
    <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#58c8ff" flood-opacity=".7"/>
  </filter>
  <filter id="purpleGlow" x="-25%" y="-25%" width="150%" height="150%">
    <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ba62ff" flood-opacity=".8"/>
  </filter>
  <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto">
    <path d="M0,0 L12,5 L0,10 Z" fill="#55c8ff"/>
  </marker>
  <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto">
    <path d="M0,0 L12,5 L0,10 Z" fill="#68e061"/>
  </marker>
  <marker id="arrowRed" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto">
    <path d="M0,0 L12,5 L0,10 Z" fill="#ff5252"/>
  </marker>
  <marker id="arrowPurple" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto">
    <path d="M0,0 L12,5 L0,10 Z" fill="#c67cff"/>
  </marker>
</defs>

<rect class="bg" width="1600" height="1040"/>
<g opacity=".55">
  <path class="grid" d="M0 120H1600M0 240H1600M0 360H1600M0 480H1600M0 600H1600M0 720H1600M0 840H1600M0 960H1600"/>
  <path class="grid" d="M120 0V1040M240 0V1040M360 0V1040M480 0V1040M600 0V1040M720 0V1040M840 0V1040M960 0V1040M1080 0V1040M1200 0V1040M1320 0V1040M1440 0V1040"/>
</g>

<text class="title" x="800" y="58" text-anchor="middle">DMoC — DYNAMIC STREAMS OF CONSCIOUSNESS</text>
<text class="subtitle" x="800" y="91" text-anchor="middle">M1–M15 modules interact as information flows inside one unified system</text>

<rect x="32" y="140" width="160" height="330" rx="24" fill="#101b2d" stroke="#ff9f25" stroke-width="2"/>
<text class="moduleText" x="112" y="178" text-anchor="middle" fill="#ffbd55">INPUTS FROM</text>
<text class="moduleText" x="112" y="202" text-anchor="middle" fill="#ffbd55">THE WORLD</text>
<text class="body" x="64" y="248">vision</text>
<text class="body" x="64" y="296">hearing</text>
<text class="body" x="64" y="344">touch</text>
<text class="body" x="64" y="392">smell / taste</text>
<text class="body" x="64" y="440">proprioception</text>

<rect class="hub" x="620" y="390" width="350" height="190" rx="26"/>
<text class="label" x="795" y="430" text-anchor="middle">M5 — WORLD MODEL /</text>
<text class="label" x="795" y="460" text-anchor="middle">ATTENTION WORKSPACE</text>
<text class="body" x="795" y="495" text-anchor="middle">world model, attention,</text>
<text class="body" x="795" y="520" text-anchor="middle">integration and causality</text>
<circle cx="795" cy="552" r="14" fill="#b8f2ff"/>
<circle cx="795" cy="552" r="38" fill="none" stroke="#a8efff" stroke-width="2" opacity=".45"/>
<circle cx="795" cy="552" r="68" fill="none" stroke="#a8efff" stroke-width="1" opacity=".25"/>

<rect class="box" x="275" y="132" width="265" height="95" stroke="#ffb02e" fill="url(#goldGrad)"/>
<text class="moduleText" x="300" y="166">M1 — OBJECT IMAGERY</text>
<text class="body" x="300" y="194">object and scene imagery</text>
<rect class="box" x="275" y="250" width="265" height="95" stroke="#ffb02e"/>
<text class="moduleText" x="300" y="284">M2 — EVENT DREAM REPLAY</text>
<text class="body" x="300" y="312">event replay, episodic simulation</text>
<rect class="box" x="198" y="405" width="270" height="96" stroke="#42c7ff"/>
<text class="moduleText" x="224" y="438">M3 — SELF ACTION CAUSALITY</text>
<text class="body" x="224" y="467">I act → what will change</text>
<rect class="box" x="100" y="570" width="310" height="96" stroke="#ff4545"/>
<text class="moduleText" x="126" y="603">M10 — MOTIVATION /</text>
<text class="moduleText" x="126" y="629">HOMEOSTASIS / DRIVE</text>
<text class="body" x="126" y="655">needs, drives, internal pressure</text>
<rect class="box" x="100" y="700" width="310" height="96" stroke="#ff4545"/>
<text class="moduleText" x="126" y="733">M12 — METACOGNITION /</text>
<text class="moduleText" x="126" y="759">CONFIDENCE / VALUATION</text>
<text class="body" x="126" y="785">evaluation, confidence, priorities</text>
<rect class="box" x="100" y="830" width="310" height="96" stroke="#ff4545"/>
<text class="moduleText" x="126" y="863">M13 — DISCOVERY / MISTAKE /</text>
<text class="moduleText" x="126" y="889">NOVELTY LEARNING</text>
<text class="body" x="126" y="915">error, novelty, learning the new</text>

<rect class="box" x="610" y="142" width="280" height="100" stroke="#6be868" fill="#0f2b16"/>
<text class="moduleText" x="635" y="176">M4 — LONG DYNAMIC MEMORY</text>
<text class="body" x="635" y="205">long-term dynamic memory</text>
<rect class="box" x="982" y="142" width="280" height="100" stroke="#6be868" fill="#0f2b16"/>
<text class="moduleText" x="1007" y="176">M6 — LEARNING /</text>
<text class="moduleText" x="1007" y="202">SLEEP / CONSOLIDATION</text>
<text class="body" x="1007" y="229">learning, sleep, consolidation</text>

<rect class="box" x="1078" y="326" width="265" height="96" stroke="#b668ff" fill="#211047"/>
<text class="moduleText" x="1104" y="359">M7 — INNER SPEECH /</text>
<text class="moduleText" x="1104" y="385">THOUGHTS</text>
<text class="body" x="1104" y="411">inner speech, thoughts, dialogue</text>
<rect class="box" x="1045" y="470" width="310" height="122" stroke="#b668ff" fill="#211047"/>
<text class="moduleText" x="1072" y="505">M11 — CONSCIOUS BROADCAST /</text>
<text class="moduleText" x="1072" y="531">GLOBAL ACCESS</text>
<text class="body" x="1072" y="561">global access, broadcast of consciousness</text>
<rect class="box" x="1030" y="682" width="310" height="105" stroke="#4fe0e0" fill="#0d2630"/>
<text class="moduleText" x="1056" y="716">M14 — CONSCIOUS PLANNER /</text>
<text class="moduleText" x="1056" y="742">EXECUTIVE PLANNING</text>
<text class="body" x="1056" y="770">planning, executive decisions</text>
<rect class="box" x="1030" y="838" width="310" height="105" stroke="#4fe0e0" fill="#0d2630"/>
<text class="moduleText" x="1056" y="872">M15 — IMAGINATION /</text>
<text class="moduleText" x="1056" y="898">COUNTERFACTUAL PLANNING</text>
<text class="body" x="1056" y="926">counterfactual scenarios</text>

<rect class="box" x="620" y="665" width="320" height="140" stroke="#a35bff" fill="#170b35"/>
<text class="moduleText" x="650" y="702">M9 — SELF CORE / SELF MODEL</text>
<text class="body" x="650" y="734">self-awareness, identity, goals, values</text>
<circle cx="780" cy="773" r="26" fill="#e8b8ff" opacity=".35"/>
<path d="M780 740C750 762 746 801 780 820C814 801 810 762 780 740Z" fill="none" stroke="#e8b8ff" stroke-width="3"/>

<rect x="1388" y="118" width="165" height="455" rx="25" fill="#0b2635" stroke="#31cfff" stroke-width="3" stroke-dasharray="12 9"/>
<text class="moduleText" x="1470" y="164" text-anchor="middle">M8 — DEBUG</text>
<text class="moduleText" x="1470" y="190" text-anchor="middle">VISUAL CONTROL</text>
<text class="body" x="1470" y="235" text-anchor="middle">external monitoring</text>
<text class="body" x="1470" y="260" text-anchor="middle">and control</text>
<rect x="1416" y="300" width="108" height="160" rx="14" fill="#061321" stroke="#41d7ff"/>
<path d="M1435 338H1505M1435 374H1505M1435 410H1505" stroke="#41d7ff" opacity=".75"/>
<circle cx="1470" cy="500" r="28" fill="none" stroke="#41d7ff"/>
<text class="caption" x="1470" y="545" text-anchor="middle">observation • tuning</text>
<rect x="1412" y="640" width="140" height="220" rx="22" fill="#eef6ff" stroke="#7aa7d5"/>
<text class="moduleText" x="1482" y="680" text-anchor="middle" fill="#0d4a8a">TO OUTPUT</text>
<text class="body" x="1460" y="735" fill="#0d4a8a">movement</text>
<text class="body" x="1460" y="790" fill="#0d4a8a">speech</text>
<text class="body" x="1460" y="845" fill="#0d4a8a">world interaction</text>

