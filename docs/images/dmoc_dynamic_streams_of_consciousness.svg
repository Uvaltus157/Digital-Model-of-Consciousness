<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1180" viewBox="0 0 1800 1180" role="img" aria-labelledby="title desc">
<title id="title">DMoC — Current M1-M15 Runtime Architecture</title>
<desc id="desc">Pure vector SVG diagram of current DMoC modules and runtime information flow after adding M2, M4, M13 and expanded M14.</desc>
<style>
  .bg { fill: #07111f; }
  .grid { stroke: #16324c; stroke-width: 1; opacity: .42; }
  .title { font: 800 42px Arial, sans-serif; fill: #f4fbff; letter-spacing: 1px; }
  .subtitle { font: 400 19px Arial, sans-serif; fill: #b9d8f2; }
  .box { fill: #0b182b; stroke-width: 2.2; rx: 18; filter: url(#glow); }
  .hub { fill: url(#hubGrad); stroke: #55d7ff; stroke-width: 3; filter: url(#bigGlow); }
  .label { font: 800 22px Arial, sans-serif; fill: #ffffff; }
  .moduleText { font: 800 17px Arial, sans-serif; fill: #ffffff; }
  .body { font: 400 15px Arial, sans-serif; fill: #d7ecff; }
  .small { font: 400 13px Arial, sans-serif; fill: #b8cfe8; }
  .caption { font: 400 14px Arial, sans-serif; fill: #b8cfe8; }
  .flow { fill: none; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowBlue); filter: url(#softGlow); }
  .flowThin { fill: none; stroke-width: 3.6; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowBlue); filter: url(#softGlow); }
  .feedback { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 9 10; marker-end: url(#arrowGreen); }
  .control { fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 4 12; marker-end: url(#arrowRed); }
  .broadcast { fill: none; stroke: #c67cff; stroke-width: 5; stroke-linecap: round; marker-end: url(#arrowPurple); filter: url(#purpleGlow); }
  .dream { fill: none; stroke: #4fe0e0; stroke-width: 4; stroke-linecap: round; stroke-dasharray: 7 7; marker-end: url(#arrowCyan); }
  .pulse { animation: dash 2.8s linear infinite; }
  .pulseSlow { animation: dash 5s linear infinite; }
  @keyframes dash { to { stroke-dashoffset: -120; } }
</style>
<defs>
  <linearGradient id="hubGrad" x1="0%" x2="100%" y1="0%" y2="100%">
    <stop offset="0%" stop-color="#06265b"/>
    <stop offset="55%" stop-color="#0b87d1"/>
    <stop offset="100%" stop-color="#14205a"/>
  </linearGradient>
  <linearGradient id="goldGrad" x1="0%" x2="100%">
    <stop offset="0%" stop-color="#442b06"/><stop offset="100%" stop-color="#b97800"/>
  </linearGradient>
  <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
    <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#36b9ff" flood-opacity=".35"/>
  </filter>
  <filter id="bigGlow" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#44e3ff" flood-opacity=".75"/>
  </filter>
  <filter id="softGlow" x="-25%" y="-25%" width="150%" height="150%">
    <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#58c8ff" flood-opacity=".7"/>
  </filter>
  <filter id="purpleGlow" x="-25%" y="-25%" width="150%" height="150%">
    <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#ba62ff" flood-opacity=".8"/>
  </filter>
  <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto"><path d="M0,0 L12,5 L0,10 Z" fill="#55c8ff"/></marker>
  <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto"><path d="M0,0 L12,5 L0,10 Z" fill="#68e061"/></marker>
  <marker id="arrowRed" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto"><path d="M0,0 L12,5 L0,10 Z" fill="#ff5252"/></marker>
  <marker id="arrowPurple" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto"><path d="M0,0 L12,5 L0,10 Z" fill="#c67cff"/></marker>
  <marker id="arrowCyan" markerWidth="14" markerHeight="14" refX="11" refY="5" orient="auto"><path d="M0,0 L12,5 L0,10 Z" fill="#4fe0e0"/></marker>
</defs>

<rect class="bg" width="1800" height="1180"/>
<g opacity=".55">
  <path class="grid" d="M0 120H1800M0 240H1800M0 360H1800M0 480H1800M0 600H1800M0 720H1800M0 840H1800M0 960H1800M0 1080H1800"/>
  <path class="grid" d="M120 0V1180M240 0V1180M360 0V1180M480 0V1180M600 0V1180M720 0V1180M840 0V1180M960 0V1180M1080 0V1180M1200 0V1180M1320 0V1180M1440 0V1180M1560 0V1180M1680 0V1180"/>
</g>

<text class="title" x="900" y="56" text-anchor="middle">DMoC — CURRENT M1–M15 RUNTIME ARCHITECTURE</text>
<text class="subtitle" x="900" y="88" text-anchor="middle">M5 focus_context → M4/M13/M2/M15/M10/M9/M7/M12/M14 conscious action chain</text>

<!-- Inputs -->
<rect x="34" y="150" width="172" height="366" rx="24" fill="#101b2d" stroke="#ff9f25" stroke-width="2"/>
<text class="moduleText" x="120" y="188" text-anchor="middle" fill="#ffbd55">INPUTS FROM</text>
<text class="moduleText" x="120" y="212" text-anchor="middle" fill="#ffbd55">THE WORLD</text>
<text class="body" x="68" y="266">vision / depth</text>
<text class="body" x="68" y="314">touch / contact</text>
<text class="body" x="68" y="362">body state</text>
<text class="body" x="68" y="410">vestibular / IMU</text>
<text class="body" x="68" y="458">actions</text>

<!-- Core hub M5 -->
<rect class="hub" x="700" y="410" width="400" height="190" rx="28"/>
<text class="label" x="900" y="452" text-anchor="middle">M5 — WORLD MODEL /</text>
<text class="label" x="900" y="482" text-anchor="middle">ATTENTION WORKSPACE</text>
<text class="body" x="900" y="518" text-anchor="middle">obs_embed, workspace_out,</text>
<text class="body" x="900" y="543" text-anchor="middle">focus_context, values</text>
<circle cx="900" cy="570" r="13" fill="#b8f2ff"/>
<circle cx="900" cy="570" r="40" fill="none" stroke="#a8efff" stroke-width="2" opacity=".45"/>
<circle cx="900" cy="570" r="70" fill="none" stroke="#a8efff" stroke-width="1" opacity=".25"/>

<!-- Left sensing/object/event/memory stack -->
<rect class="box" x="260" y="132" width="310" height="104" stroke="#ffb02e" fill="url(#goldGrad)"/>
<text class="moduleText" x="288" y="166">M1 — OBJECT IMAGERY</text>
<text class="body" x="288" y="194">object slots, inner_object,</text>
<text class="body" x="288" y="217">2D / 3D / 4D reconstruction</text>

<rect class="box" x="260" y="264" width="310" height="108" stroke="#4fe0e0" fill="#0d2630"/>
<text class="moduleText" x="288" y="299">M2 — EVENT / DREAM REPLAY</text>
<text class="body" x="288" y="327">event memory, replay_context,</text>
<text class="body" x="288" y="350">dream_pressure, should_replay</text>

<rect class="box" x="260" y="402" width="310" height="104" stroke="#6be868" fill="#0f2b16"/>
<text class="moduleText" x="288" y="437">M4 — LONG DYNAMIC MEMORY</text>
<text class="body" x="288" y="465">dynamic identity, OBJ token,</text>
<text class="body" x="288" y="488">passport, replay_z</text>

<rect class="box" x="260" y="538" width="310" height="100" stroke="#42c7ff"/>
<text class="moduleText" x="288" y="572">M3 — SELF/ACTION CAUSALITY</text>
<text class="body" x="288" y="600">I act → what changes</text>

<!-- Lower left regulation -->
<rect class="box" x="74" y="700" width="330" height="104" stroke="#ff4545" fill="#321218"/>
<text class="moduleText" x="102" y="734">M11 — MOTIVATIONAL</text>
<text class="moduleText" x="102" y="758">HOMEOSTASIS / AFFECT</text>
<text class="body" x="102" y="786">panic, comfort, stress, curiosity</text>

<rect class="box" x="74" y="830" width="330" height="104" stroke="#ff4545" fill="#321218"/>
<text class="moduleText" x="102" y="864">M12 — METACOGNITION</text>
<text class="body" x="102" y="892">confidence, doubt, verify, hold</text>
<text class="body" x="102" y="914">should_hold_action</text>

<rect class="box" x="74" y="960" width="330" height="104" stroke="#6be868" fill="#0f2b16"/>
<text class="moduleText" x="102" y="994">M13 — AUTOBIOGRAPHICAL</text>
<text class="moduleText" x="102" y="1018">MEMORY</text>
<text class="body" x="102" y="1046">episodes, retrieval_context</text>

<!-- Top learning/sleep -->
<rect class="box" x="700" y="154" width="290" height="100" stroke="#6be868" fill="#0f2b16"/>
<text class="moduleText" x="728" y="188">M6 — LEARNING / SLEEP</text>
<text class="moduleText" x="728" y="212">CONSOLIDATION</text>
<text class="body" x="728" y="236">train, sleep, checkpoint, replay</text>

<!-- Right conscious branch -->
<rect class="box" x="1198" y="144" width="322" height="104" stroke="#b668ff" fill="#211047"/>
<text class="moduleText" x="1226" y="178">M15 — COUNTERFACTUAL</text>
<text class="moduleText" x="1226" y="202">IMAGINATION / PLANNING</text>
<text class="body" x="1226" y="226">thought_chain, plan_context</text>

<rect class="box" x="1198" y="286" width="322" height="110" stroke="#b668ff" fill="#211047"/>
<text class="moduleText" x="1226" y="322">M10 — GLOBAL CONSCIOUS</text>
<text class="moduleText" x="1226" y="346">BROADCAST</text>
<text class="body" x="1226" y="372">selected_source, broadcast_latent</text>

<rect class="box" x="1198" y="438" width="322" height="104" stroke="#b668ff" fill="#211047"/>
<text class="moduleText" x="1226" y="474">M9 — SELF CORE</text>
<text class="body" x="1226" y="502">self-binding, agency, ownership,</text>
<text class="body" x="1226" y="525">continuity</text>

<rect class="box" x="1198" y="582" width="322" height="104" stroke="#b668ff" fill="#211047"/>
<text class="moduleText" x="1226" y="618">M7 — INNER SPEECH /</text>
<text class="moduleText" x="1226" y="642">THOUGHTS</text>
<text class="body" x="1226" y="666">report_latent, decoded_report</text>

<rect class="box" x="1198" y="724" width="322" height="116" stroke="#4fe0e0" fill="#0d2630"/>
<text class="moduleText" x="1226" y="760">M14 — SEMANTIC ACTION</text>
<text class="moduleText" x="1226" y="784">GROUNDING</text>
<text class="body" x="1226" y="812">semantic_intent, goal_text,</text>
<text class="body" x="1226" y="834">action_scale, expected_outcome</text>

<!-- M8 and output -->
<rect x="1590" y="148" width="170" height="430" rx="25" fill="#0b2635" stroke="#31cfff" stroke-width="3" stroke-dasharray="12 9"/>
<text class="moduleText" x="1675" y="192" text-anchor="middle">M8 — DEBUG</text>
<text class="moduleText" x="1675" y="216" text-anchor="middle">VISUAL CONTROL</text>
<text class="body" x="1675" y="260" text-anchor="middle">module status</text>
<text class="body" x="1675" y="284" text-anchor="middle">visualizers</text>
<text class="body" x="1675" y="308" text-anchor="middle">IPC overrides</text>
<rect x="1618" y="346" width="112" height="152" rx="14" fill="#061321" stroke="#41d7ff"/>
<path d="M1640 384H1708M1640 420H1708M1640 456H1708" stroke="#41d7ff" opacity=".75"/>
<circle cx="1674" cy="532" r="16" fill="#41d7ff" opacity=".7"/>

<rect x="1590" y="700" width="170" height="230" rx="22" fill="#eef6ff" stroke="#7aa7d5"/>
<text class="moduleText" x="1675" y="740" text-anchor="middle" fill="#0d4a8a">TO OUTPUT</text>
<text class="body" x="1622" y="792" fill="#0d4a8a">movement</text>
<text class="body" x="1622" y="842" fill="#0d4a8a">speech</text>
<text class="body" x="1622" y="892" fill="#0d4a8a">world interaction</text>

